<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-layer"></div>
  <div id="app">
    <div class="top">
      <button class="playlist"></button>
      <button class="bg"></button>
      <input type="file" id="bg-upload" accept="image/*" style="display: none;">
    </div>
    <div class="container">
      <div class="modes">
        <button class="active">POMODORO</button>
        <button>SHORT BREAK</button>
        <button>LONG BREAK</button>
      </div>
      <div class="timer">20:00</div>
      <div class="controls">
        <button class="start-button">START!</button>
        <button class="settings"></button>
        <button class="reset"></button>

      </div>
    </div>
  </div>
  <div class="modal-overlay" hidden>
    <div class="modal-container">
      <div class="modal-nav">
        <button class="nav-item" data-section="THEME">THEME</button>
        <button class="nav-item" data-section="TIMER">TIMER</button>
        <button class="nav-item" data-section="SOUNDS">SOUNDS</button>
      </div>
      <div class="modal-settings-content">
        <div id="theme-settings" class="theme-section active">
          <h3 class="hd">Select theme:</h3>
          <div class="setting-item">
            <label for="theme-select">Theme:</label>
            <div class="custom-select-wrapper" tabindex="0">
              <select id="theme-select" class="form-select">
                <option value="Cozy">Cozy</option>
                <option value="Sunrise">Sunrise</option>
                <option value="Night">Night</option>
              </select>
              <div class="select-arrow"></div>
            </div>
          </div>
        </div>
        <div class="timer-settings">
          <div class="tsetcontainer">
            <div class="pomo">
              <label for="pom" class="form-label"></label>
              <input type="number" id="pom" step="1" min="1" max="90" value="20">
              <div class="form-text">minutes</div>
            </div>
            <div class="sbr">
              <label for="sbr" class="form-label"></label>
              <input type="number" id="sbr" step="1" min="1" max="90" value="5">
              <div class="form-text">minutes</div>
            </div>
            <div class="lbr">
              <label for="lbr" class="form-label"></label>
              <input type="number" id="lbr" step="1" min="1" max="90" value="15">
              <div class="form-text">minutes</div>
            </div>
          </div>
        </div>
        <div class="sound-settings">
          <label for="alertSound" class="form-label">Select alert sound:</label>
          <div class="custom-select-wrapper" tabindex="0">
            <select id="alertSound" class="form-select1" aria-label="Select timer alert sound">
              <option value="Digital">Digital</option>
              <option value="Classic">Classic</option>
              <option value="Siren">Siren</option>
              <option value="Watchtower">Watchtower</option>
            </select>
            <div class="select-arrow1"></div>
          </div>

          <div class="sound-switch">
            <input class="form-check-input" type="checkbox" id="playTimerSound" checked>
            <label class="form-check-label" for="playTimerSound">Notifications</label>
          </div>
          <div class="volume-slider">
            <label for="timerSoundVolume" class="form-label">Alert volume</label>
            <input type="range" class="form-range" min="0" max="1" step="0.05" id="timerSoundVolume">
          </div>
        </div>
        <div class="end-section">
          <button class="reset-settings">Reset Settings</button>
          <button class="close">Close</button>
          <button class="savechanges">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Music Player Overlay -->
  <div class="music-overlay" id="musicOverlay" hidden>
    <div class="music-player">
      <!-- Add Audio Element -->
      <audio id="audioPlayer" preload="metadata"></audio>

      <div class="player-header">
        <h3>Music Player</h3>
        <button class="close-btn" id="closeMusicPlayer">×</button>
      </div>

      <div class="song-selector">
        <div class="custom-dropdown" id="songDropdown">
          <div class="selected-song" id="selectedSong">
            <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
            </svg>
            <span>No Music</span>
            <svg class="dropdown-arrow" viewBox="0 0 24 24" width="12" height="12">
              <path fill="currentColor" d="M7 10l5 5 5-5z" />
            </svg>
          </div>
          <ul class="song-options" id="songOptions">
            <li data-value="none" data-file="" class="song-option active">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              No Music
            </li>
            <li data-value="track1" data-file="assets/audio/lofi1.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Lofi 1
            </li>
            <li data-value="track2" data-file="assets/audio/lofi2.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Lofi 2
            </li>
            <li data-value="track3" data-file="assets/audio/battle.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Battle
            </li>
            <li data-value="track4" data-file="assets/audio/energetic.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Energetic
            </li>
            <li data-value="track5" data-file="assets/audio/peace.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Peace
            </li>
            <li data-value="track6" data-file="assets/audio/piano.mp3" class="song-option">
              <svg class="track-icon" viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z" />
              </svg>
              Piano
            </li>
          </ul>
        </div>
      </div>

      <div class="player-controls">
        <button class="control-btn" id="backwardBtn" title="Previous">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>
        <button class="control-btn" id="playBtn" title="Play">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M8 5v14l11-7z" />
          </svg>
        </button>
        <button class="control-btn" id="forwardBtn" title="Next">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
